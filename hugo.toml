baseURL = "https://saurabhj4in.github.io/articles/"
locale   = "en-us"
title    = "Saurabh Jain"
theme    = "sj"
paginate = 6

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag      = "tags"
  category = "categories"

[params]
  author      = "Saurabh Jain"
  tagline     = "Security · Cloud · Bug Bounty"
  description = "Security engineer writing about cloud security, bug bounties, AWS, and the grey areas no one puts on a slide deck."
  avatar      = "https://avatars.githubusercontent.com/u/saurabhj4in"
  mediumURL   = "https://saurabh-jain.medium.com/"
  linkedinURL = "https://www.linkedin.com/in/saurabh-jain-503991165/"
  githubURL   = "https://github.com/saurabhj4in"

  # Giscus comments — fill these after creating the GitHub repo
  # Get values from https://giscus.app
  [params.giscus]
    enabled        = false
    repo           = "saurabhj4in/blog"
    repoId         = ""
    category       = "Announcements"
    categoryId     = ""
    mapping        = "pathname"
    strict         = "0"
    reactionsEnabled = "1"
    emitMetadata   = "0"
    inputPosition  = "top"
    theme          = "transparent_dark"
    lang           = "en"

  # Analytics — set your Plausible domain or leave blank
  [params.analytics]
    plausible = ""   # e.g. "yourdomain.com"

[markup]
  [markup.highlight]
    noClasses = false
    style     = "dracula"
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 4
