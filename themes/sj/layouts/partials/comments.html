{{ if .Site.Params.giscus.enabled }}
<section class="comments-section">
  <h2 class="comments-title">Discussion</h2>
  <script src="https://giscus.app/client.js"
    data-repo="{{ .Site.Params.giscus.repo }}"
    data-repo-id="{{ .Site.Params.giscus.repoId }}"
    data-category="{{ .Site.Params.giscus.category }}"
    data-category-id="{{ .Site.Params.giscus.categoryId }}"
    data-mapping="{{ .Site.Params.giscus.mapping }}"
    data-strict="{{ .Site.Params.giscus.strict }}"
    data-reactions-enabled="{{ .Site.Params.giscus.reactionsEnabled }}"
    data-emit-metadata="{{ .Site.Params.giscus.emitMetadata }}"
    data-input-position="{{ .Site.Params.giscus.inputPosition }}"
    data-theme="{{ .Site.Params.giscus.theme }}"
    data-lang="{{ .Site.Params.giscus.lang }}"
    crossorigin="anonymous"
    async>
  </script>
</section>
{{ else }}
<section class="comments-section comments-disabled">
  <div class="comments-placeholder">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <p>Comments coming soon via Giscus.</p>
    <a href="{{ .Site.Params.mediumURL }}{{ .Slug }}" target="_blank" rel="noopener">Discuss this on Medium →</a>
  </div>
</section>
{{ end }}
