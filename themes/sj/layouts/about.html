{{ define "main" }}
<div class="container">
  <div class="about-layout">

    <aside class="about-sidebar">
      <img class="about-avatar" src="https://github.com/saurabhj4in.png" alt="Saurabh Jain">
      <h1 class="about-name">Saurabh Jain</h1>
      <p class="about-role">Security Engineer</p>
      <div class="about-links">
        <a href="{{ .Site.Params.mediumURL }}" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 195 195" fill="currentColor"><ellipse cx="55" cy="97.5" rx="55" ry="55"/><ellipse cx="149.5" cy="97.5" rx="29.5" ry="52"/><ellipse cx="186.5" cy="97.5" rx="8.5" ry="45"/></svg>
          Medium
        </a>
        <a href="{{ .Site.Params.linkedinURL }}" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
          LinkedIn
        </a>
        <a href="{{ .Site.Params.githubURL }}" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          GitHub
        </a>
      </div>
      <div class="about-stats">
        <div class="stat"><span class="stat-num">{{ len (where .Site.RegularPages "Type" "posts") }}</span><span class="stat-label">Articles</span></div>
        <div class="stat"><span class="stat-num">186</span><span class="stat-label">Followers</span></div>
      </div>
    </aside>

    <div class="about-body">
      <div class="about-content">{{ .Content }}</div>
    </div>

  </div>
</div>
{{ end }}
